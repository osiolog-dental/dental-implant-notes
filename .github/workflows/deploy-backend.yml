name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /app/dental-implant-notes

            echo "Ensuring correct git remote..."
            git remote set-url origin https://x-access-token:${{ secrets.GH_DEPLOY_TOKEN }}@github.com/osioloc-dental/dental-implant-notes.git

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Installing dependencies..."
            source /app/venv/bin/activate
            pip install -r backend/requirements.txt -q

            echo "Running migrations (using env from systemd service file)..."
            # Source the same env file that the systemd service uses
            SVCENV=$(sudo systemctl show osioloc-backend --property=EnvironmentFiles 2>/dev/null | grep -oP '(?<=EnvironmentFiles=)[^ ]+' | head -1 || true)
            if [ -n "$SVCENV" ] && [ -f "$SVCENV" ]; then
              set -a && source "$SVCENV" && set +a
              echo "Loaded env from: $SVCENV"
            else
              echo "Checking fallback env locations..."
              for f in /etc/osioloc.env /app/osioloc.env /etc/osioloc/env; do
                [ -f "$f" ] && { set -a && source "$f" && set +a && echo "Loaded $f" && break; }
              done
            fi
            cd backend
            alembic upgrade head
            cd ..

            echo "Updating Firebase config in env..."
            sudo grep -q "FIREBASE_PROJECT_ID" /app/.env \
              && sudo sed -i 's/FIREBASE_PROJECT_ID=.*/FIREBASE_PROJECT_ID=osiolog-prod/' /app/.env \
              || echo "FIREBASE_PROJECT_ID=osiolog-prod" | sudo tee -a /app/.env
            sudo sed -i 's|FIREBASE_SERVICE_ACCOUNT_JSON=.*|FIREBASE_SERVICE_ACCOUNT_JSON=|' /app/.env
            sudo grep "FIREBASE_PROJECT_ID\|FIREBASE_SERVICE_ACCOUNT" /app/.env

            echo "Restarting backend..."
            sudo systemctl restart osioloc-backend

            echo "Waiting for health check..."
            sleep 3
            curl -sf http://localhost:8002/api/health || (echo "Health check failed!" && exit 1)

            echo "Seeding demo user..."
            cd backend && python3 seed_demo_user.py && cd ..

            echo "Deploy complete!"
