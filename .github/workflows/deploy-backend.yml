name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /app/dental-implant-notes

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            source /app/venv/bin/activate
            pip install -r backend/requirements.txt -q

            echo "Running migrations..."
            # Load env vars (try multiple locations)
            if [ -f /app/osioloc.env ]; then set -a && source /app/osioloc.env && set +a
            elif [ -f /app/dental-implant-notes/backend/.env ]; then set -a && source /app/dental-implant-notes/backend/.env && set +a
            elif [ -f /etc/osioloc.env ]; then set -a && source /etc/osioloc.env && set +a
            else echo "Warning: no env file found, relying on system env"; fi
            cd backend
            alembic upgrade head
            cd ..

            echo "Restarting backend..."
            sudo systemctl restart osioloc-backend

            echo "Waiting for health check..."
            sleep 3
            curl -sf http://localhost:8002/api/health || (echo "Health check failed!" && exit 1)

            echo "Deploy complete!"
