name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - 'frontend/.env.production'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_VAPID_KEY: ${{ secrets.REACT_APP_FIREBASE_VAPID_KEY }}
          NODE_OPTIONS: --openssl-legacy-provider
        run: npx craco build

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'frontend/build/*'
          target: '/tmp/osiolog-build'
          strip_components: 2

      - name: Install build and reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          script: |
            set -e

            echo "=== Finding nginx frontend root ==="
            FRONTEND_ROOT=$(sudo nginx -T 2>/dev/null | grep -B2 -A20 "app.osiolog\|server_name.*app" | grep "root" | awk '{print $2}' | tr -d ';' | head -1)
            echo "Detected root: $FRONTEND_ROOT"

            # If not detected, print full nginx config for debugging
            if [ -z "$FRONTEND_ROOT" ]; then
              echo "=== Full nginx config (truncated) ==="
              sudo nginx -T 2>/dev/null | head -80
              FRONTEND_ROOT="/var/www/html"
              echo "Falling back to: $FRONTEND_ROOT"
            fi

            echo "=== Deploying to $FRONTEND_ROOT ==="
            sudo mkdir -p $FRONTEND_ROOT
            sudo rsync -a --delete /tmp/osiolog-build/ $FRONTEND_ROOT/
            sudo chown -R www-data:www-data $FRONTEND_ROOT
            rm -rf /tmp/osiolog-build

            echo "=== Reloading nginx ==="
            sudo nginx -t && sudo systemctl reload nginx
            echo "Deploy complete — serving from $FRONTEND_ROOT"
