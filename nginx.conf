server {
    listen 80;
    server_name api.osiolog.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.osiolog.com;

    ssl_certificate /etc/letsencrypt/live/api.osiolog.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.osiolog.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    location /health {
        proxy_pass http://127.0.0.1:8002/api/health;
    }
}
